# render.yaml - Render Blueprint for Django Ecommerce Backend
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: m1backend-ecommerce
    runtime: python
    rootDir: m1backend/ecommerce/project
    buildCommand: "./build.sh"
    startCommand: "gunicorn project.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"
      # OPTIONAL: Uncomment below to use Render's PostgreSQL database
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: m1backend-db
      #     property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set this manually to your Vercel frontend URL

# OPTIONAL: Uncomment to create PostgreSQL database
# databases:
#   - name: m1backend-db
#     databaseName: ecommerce
#     user: ecommerce_user
#     plan: free
